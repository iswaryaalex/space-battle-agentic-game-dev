# OpenCode — Space Blaster Workshop
# Routes all agent calls to the local Lemonade inference server

[model]
  default = "Qwen3-Coder-30B-A3B-Instruct-GGUF"

[provider.openai]
  base_url = "http://localhost:8000/api/v0"
  api_key  = "lemonade"

[context]
  auto_include = ["game.html"]

[agents]
  [agents.ui-renderer]
    model = "Qwen3-Coder-30B-A3B-Instruct-GGUF"

  [agents.physics-movement]
    model = "Qwen3-Coder-30B-A3B-Instruct-GGUF"

  [agents.gameplay-rules]
    model = "Qwen3-Coder-30B-A3B-Instruct-GGUF"

  # Optional — uncomment to activate
  # [agents.vfx-polish]
  #   model = "Qwen3-Coder-30B-A3B-Instruct-GGUF"

  # [agents.boss-ai]
  #   model = "Qwen3-Coder-30B-A3B-Instruct-GGUF"
